<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Прага · NLT">
<meta name="theme-color" content="#1d3557">
<title>Прага · Ритрит NLT 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f0e8;--card:#fefcf8;--card2:#f0ebe0;
  --blue:#1d3557;--blue2:#2a4a74;--blue-l:#e8eef5;--blue-ll:#f0f4f8;
  --terra:#8b4513;--terra-l:#f5e8dc;
  --green:#3d6b4f;--green-l:#e8f0eb;
  --gold:#9a7415;--gold-l:#fef3dc;
  --text:#1a1410;--t2:#5a4f42;--t3:#9a8e80;
  --border:#ddd5c5;--border2:#c8bfaf;
  --sh:0 2px 12px rgba(29,53,87,.10);
  --nav:64px;--hdr:56px;
  --r:14px;--r2:20px;
  --ff-head:'Cormorant Garamond',Georgia,serif;
  --ff-body:'Jost',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--ff-body);background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;font-size:15px;line-height:1.6}
#app{display:flex;flex-direction:column;height:100dvh}

/* HEADER */
#hdr{background:var(--blue);color:#fff;padding:0 16px;height:var(--hdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
#hdr-left{display:flex;flex-direction:column}
#hdr-date{font-size:11px;opacity:.65;font-family:var(--ff-body);font-weight:300;letter-spacing:.05em;text-transform:uppercase}
#hdr-title{font-family:var(--ff-head);font-size:17px;font-weight:600;letter-spacing:.01em;line-height:1.2}
#day-pills{display:flex;gap:5px}
.dpill{padding:5px 10px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);background:transparent;cursor:pointer;font-family:var(--ff-body);transition:all .18s}
.dpill.active{background:#fff;color:var(--blue);border-color:#fff;font-weight:500}

/* CONTENT */
#content{flex:1;overflow:hidden;position:relative}
.tab{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;background:var(--bg)}
.tab.active{display:block}
.tab-inner{padding:16px 16px calc(var(--nav) + 20px)}

/* MAP TAB */
#tab-map{overflow:hidden}
#map{position:absolute;inset:0;bottom:var(--nav)}
#map-info{position:absolute;bottom:calc(var(--nav) + 12px);left:12px;right:12px;background:var(--card);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);display:none;z-index:1000}
#map-info-name{font-family:var(--ff-head);font-size:16px;font-weight:600;color:var(--blue)}
#map-info-desc{font-size:13px;color:var(--t2);margin-top:4px;line-height:1.5;max-height:60px;overflow:hidden}
#map-info-actions{display:flex;gap:8px;margin-top:10px}
.map-btn{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;border:none;cursor:pointer;font-family:var(--ff-body)}
.map-btn.primary{background:var(--blue);color:#fff}
.map-btn.secondary{background:var(--bg);color:var(--blue);border:1px solid var(--border)}
#locate-btn{position:absolute;top:12px;right:12px;z-index:1000;width:42px;height:42px;border-radius:50%;background:var(--card);box-shadow:var(--sh);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer}

/* CARDS */
.section-label{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;margin-top:20px}
.section-label:first-child{margin-top:0}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:10px;overflow:hidden;border:1px solid var(--border)}
.card-head{padding:14px 16px;display:flex;align-items:flex-start;gap:12px}
.card-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ci-blue{background:var(--blue-l)}
.ci-terra{background:var(--terra-l)}
.ci-green{background:var(--green-l)}
.ci-gold{background:var(--gold-l)}
.card-meta{flex:1;min-width:0}
.card-time{font-size:11px;color:var(--t3);font-weight:400;font-family:var(--ff-body);letter-spacing:.03em}
.card-name{font-family:var(--ff-head);font-size:17px;font-weight:600;color:var(--text);line-height:1.2}
.card-sub{font-size:13px;color:var(--t2);margin-top:3px;line-height:1.5}
.card-body{padding:0 16px 14px;border-top:1px solid var(--border);padding-top:12px;display:none}
.card-body.open{display:block}
.card-desc{font-size:13.5px;color:var(--t2);line-height:1.7}
.card-visio{background:var(--blue-ll);border-radius:8px;padding:10px 12px;margin-top:10px;font-size:12.5px;color:var(--blue2);font-style:italic;line-height:1.6;border-left:3px solid var(--blue)}
.card-visio::before{content:'Visio Divina · ';font-style:normal;font-weight:500;font-size:11px;letter-spacing:.04em;text-transform:uppercase;opacity:.7;display:block;margin-bottom:3px}
.card-quote{font-family:var(--ff-head);font-size:15px;font-style:italic;color:var(--terra);border-left:2px solid var(--terra);padding-left:10px;margin-top:10px;line-height:1.5}
.card-tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.tag{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
.tag-prog{background:var(--blue-l);color:var(--blue)}
.tag-extra{background:var(--green-l);color:var(--green)}
.tag-food{background:var(--terra-l);color:var(--terra)}
.card-actions{display:flex;gap:8px;margin-top:10px}
.action-btn{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;border:none;cursor:pointer;font-family:var(--ff-body);text-decoration:none;display:inline-block}
.action-btn.blue{background:var(--blue);color:#fff}
.action-btn.outline{background:transparent;color:var(--blue);border:1px solid var(--border)}
.expand-toggle{width:100%;background:none;border:none;border-top:1px solid var(--border);padding:10px 16px;font-size:12px;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-family:var(--ff-body)}
.expand-arrow{transition:transform .2s;display:inline-block}
.expand-arrow.open{transform:rotate(180deg)}

/* DAY HERO */
.day-hero{background:var(--blue);color:#fff;border-radius:var(--r2);padding:20px 20px 18px;margin-bottom:16px;position:relative;overflow:hidden}
.day-hero::after{content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.05)}
.hero-label{font-size:11px;opacity:.65;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;font-weight:400}
.hero-title{font-family:var(--ff-head);font-size:26px;font-weight:600;line-height:1.15;margin-bottom:6px}
.hero-theme{font-size:13px;opacity:.8;font-style:italic;font-family:var(--ff-head);line-height:1.4}
.hero-passage{margin-top:12px;display:inline-block;background:rgba(255,255,255,.15);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500}

/* QUESTION CARD */
.question-card{background:var(--gold-l);border-radius:var(--r);border:1px solid #e0c88a;padding:16px;margin-bottom:16px}
.qc-label{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.qc-text{font-family:var(--ff-head);font-size:16px;color:var(--text);line-height:1.5;font-style:italic}

/* TIMELINE */
.tl-item{display:flex;gap:12px;padding:8px 0;position:relative}
.tl-item::before{content:'';position:absolute;left:19px;top:36px;bottom:-8px;width:1px;background:var(--border)}
.tl-item:last-child::before{display:none}
.tl-dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:2px solid var(--border);background:var(--card);z-index:1}
.tl-dot.active{border-color:var(--blue);background:var(--blue);font-size:18px}
.tl-dot.done{border-color:var(--green);background:var(--green-l)}
.tl-right{flex:1;min-width:0;padding-bottom:8px}
.tl-time{font-size:11px;color:var(--t3);letter-spacing:.04em}
.tl-title{font-size:15px;font-weight:500;color:var(--text);margin-top:1px}
.tl-sub{font-size:12.5px;color:var(--t2);margin-top:2px;line-height:1.5}
.tl-item.active .tl-title{color:var(--blue);font-weight:500}
.tl-item.active .tl-dot{box-shadow:0 0 0 4px var(--blue-l)}

/* SCRIPTURE */
.lectio-step{background:var(--card);border-radius:var(--r);border:1px solid var(--border);margin-bottom:8px;overflow:hidden}
.ls-head{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.ls-num{width:30px;height:30px;border-radius:50%;background:var(--blue);color:#fff;font-family:var(--ff-head);font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ls-name{font-family:var(--ff-head);font-size:16px;font-weight:600}
.ls-sub{font-size:12px;color:var(--t3);margin-top:1px}
.ls-body{padding:0 16px 14px;border-top:1px solid var(--border)}
.ls-body p{font-size:13.5px;color:var(--t2);line-height:1.7;margin-top:10px}
.ls-q{font-size:13px;color:var(--blue2);font-style:italic;margin-top:8px;padding:8px 12px;background:var(--blue-ll);border-radius:8px}
.q-item{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:14px 16px;margin-bottom:8px}
.q-num{font-size:11px;font-weight:500;color:var(--terra);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.q-text{font-size:14px;color:var(--text);line-height:1.65}
.conclusion-card{background:var(--green-l);border-radius:var(--r);border:1px solid #a8c8b4;padding:14px 16px;margin-top:4px}
.cc-label{font-size:11px;font-weight:500;color:var(--green);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.cc-text{font-size:13.5px;color:var(--text);line-height:1.6}
.passage-chip{display:inline-block;background:var(--blue-l);color:var(--blue);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:500;margin:3px;font-family:var(--ff-head)}

/* DISTANCE */
.dist-badge{font-size:11px;color:var(--t3);background:var(--bg);border-radius:20px;padding:2px 8px;border:1px solid var(--border);font-weight:400}

/* BOTTOM NAV */
#nav{background:var(--card);border-top:1px solid var(--border);height:var(--nav);display:flex;align-items:stretch;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;color:var(--t3);transition:color .15s;padding:0;font-family:var(--ff-body)}
.nav-btn.active{color:var(--blue)}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:10px;font-weight:500;letter-spacing:.03em}

/* UTILS */
.mt-8{margin-top:8px}
.no-content{text-align:center;padding:40px 20px;color:var(--t3);font-family:var(--ff-head);font-size:16px;font-style:italic}
</style>
</head>
<body>
<div id="app">
  <header id="hdr">
    <div id="hdr-left">
      <div id="hdr-date"></div>
      <div id="hdr-title">Прага · Ритрит NLT</div>
    </div>
    <div id="day-pills"></div>
  </header>

  <div id="content">
    <div id="tab-today" class="tab active"><div class="tab-inner" id="today-inner"></div></div>
    <div id="tab-map" class="tab">
      <div id="map"></div>
      <button id="locate-btn" onclick="locateUser()">📍</button>
      <div id="map-info">
        <div id="map-info-name"></div>
        <div id="map-info-desc"></div>
        <div id="map-info-actions"></div>
      </div>
    </div>
    <div id="tab-places" class="tab"><div class="tab-inner" id="places-inner"></div></div>
    <div id="tab-scripture" class="tab"><div class="tab-inner" id="scripture-inner"></div></div>
  </div>

  <nav id="nav">
    <button class="nav-btn active" onclick="showTab('today')" id="nb-today">
      <span class="nav-icon">📅</span><span class="nav-label">Сегодня</span>
    </button>
    <button class="nav-btn" onclick="showTab('map')" id="nb-map">
      <span class="nav-icon">🗺️</span><span class="nav-label">Карта</span>
    </button>
    <button class="nav-btn" onclick="showTab('places')" id="nb-places">
      <span class="nav-icon">📍</span><span class="nav-label">Места</span>
    </button>
    <button class="nav-btn" onclick="showTab('scripture')" id="nb-scripture">
      <span class="nav-icon">📖</span><span class="nav-label">Писание</span>
    </button>
  </nav>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

const HOME = { lat: 50.08700, lng: 14.40750 };

const PLACES = {
  'home': { name: 'Проживание', sub: 'Dražického náměstí 10', lat: 50.08700, lng: 14.40750, icon: '🏠', type: 'home', desc: 'Ваш дом на всё время ритрита — в самом сердце Малой Страны, в 100 метрах от Карлова моста.' },
  'charles-bridge': { name: 'Карлов мост', sub: '1357–1402 · Malá Strana', lat: 50.08648, lng: 14.41144, icon: '🌉', type: 'program', hours: 'Открыт круглосуточно', desc: 'Тридцать барочных скульптур святых, поставленных с XIV по XVIII век — каждая сделана конкретными руками. Карл IV строил мост как дорогу паломников: отсюда шли в Рим. На каждом камне — след чьего-то труда и чьей-то молитвы. Вечером после заката — почти пуст. Фонари отражаются в Влтаве, Пражский Град темнеет на фоне неба.', quote: 'Камни, которые держатся уже 600 лет, — потому что их укладывали не для галочки.' },
  'waldstein-garden': { name: 'Вальдштейнский сад', sub: '1623 · Malá Strana', lat: 50.09040, lng: 14.40788, icon: '🌿', type: 'extra', hours: 'Пн–Пт 7:00–19:00 · Сб–Вс 9:00–19:00', desc: 'Барочный сад в 5 минутах от дома — бесплатный, малолюдный утром. Полководец Валленштейн хотел сад красивее, чем у самого Пражского Града. Аллеи стриженых лип, грот с искусственными сталактитами, бронзовые скульптуры, живые павлины. Место для тихих 15 минут до или после занятий.', quote: 'Барокко как попытка построить рай на земле. Почти получилось.' },
  'nerudova': { name: 'Нерудова улица', sub: 'Malá Strana → Hrad', lat: 50.08852, lng: 14.39944, icon: '🚶', type: 'extra', hours: 'Всегда открыта', desc: 'Прямой путь к Пражскому Граду — и одновременно одна из красивейших улиц города. До 1770-х дома не нумеровались: каждый имел эмблему ремесленника или торговца — «У двух солнц», «У красного льва», «У золотой подковы». Труд как идентичность — задолго до визиток.', quote: 'Улица, где каждый дом подписан своей профессией.' },
  'orloj': { name: 'Орлой — Астрономические часы', sub: '1410 · Staré Město', lat: 50.08702, lng: 14.42071, icon: '⚙️', type: 'program', hours: 'Площадь открыта круглосуточно · Смена фигур — каждый час', desc: 'Мастер Микулаш из Кадани строил их не как инструмент измерения, а как образ мира. Один механизм: обычное время, старочешское время (сутки с захода солнца), движение солнца, луны, знаки зодиака. Весь космос в одном циферблате. Каждый час скелет — memento mori — тянет за верёвку. За ним идут двенадцать апостолов. Смерть напоминает о себе — и тут же идут те, кто её победил.', visio: 'Посмотрите на часы как на попытку вместить весь мир — время, небо, смерть, воскресение — в один образ. Что это говорит о человеке, который это создал?', quote: 'Люди строили это не чтобы измерять время. Они искали смысл в устройстве мира.' },
  'tyn-church': { name: 'Тынская церковь', sub: 'XIV в. · Staré Město', lat: 50.08775, lng: 14.42254, icon: '⛪', type: 'extra', hours: 'Вт–Сб 10:00–13:00 и 15:00–17:00 · Вс 10:00–12:00', desc: 'Двойные готические шпили 80 метров — доминанта Старого города с XIV века. В XV веке — главная гуситская церковь Европы, реформация за 100 лет до Лютера. У главного алтаря покоится Тихо Браге, датский астроном, всю жизнь смотревший на звёзды. Вход бесплатный.', quote: 'Место, где небо и бунт жили в одном здании.' },
  'st-vitus': { name: 'Собор Святого Вита', sub: '1344–1929 · Hradčany', lat: 50.09089, lng: 14.40051, icon: '⛪', type: 'program', hours: 'Пн–Сб 9:00–16:00 · Вс 12:00–16:00', desc: 'Карл IV заложил первый камень в 1344 году. Последний поставили в 1929-м — через 585 лет. Поколения мастеров работали, зная, что не доживут до конца. Архитектор Петер Парлер поместил свой скульптурный автопортрет в трифорий — в один ряд с королями. Ремесленник, который поставил себя рядом с властью. Вся готика — ради одного: Бог есть свет. Все технические инновации существовали только чтобы убрать стены и впустить витражный свет.', visio: 'Найдите одну деталь — луч света, лицо на витраже, линию камня — и смотрите на неё как на труд конкретного человека. Что этот человек говорит о Боге через свои руки?', quote: 'Великие вещи рождаются не из спешки, а из верности, которая длится дольше одной жизни.' },
  'kafka-museum': { name: 'Музей Франца Кафки', sub: 'Malá Strana · 3 мин от дома', lat: 50.08832, lng: 14.41014, icon: '✍️', type: 'extra', hours: 'Ежедневно 10:00–18:00', desc: 'Кафка работал страховым агентом днём и писал ночью — всю жизнь. Он так и не смог примирить эти два мира: труд-ради-жизни и труд-ради-смысла. Лабиринтная экспозиция, тени, фрагменты рукописей, атмосфера тревоги и поиска. Именно тот вопрос, которым занят весь ваш ритрит — с более тёмной стороны.', quote: 'Человек, которому суета открылась изнутри — и который не смог её принять.' },
  'strahov-library': { name: 'Страговская библиотека', sub: 'XII в. · Hradčany', lat: 50.08635, lng: 14.38870, icon: '📚', type: 'extra', hours: 'Ежедневно 9:00–17:00', desc: 'Теологический зал — 1679 год, расписные своды, глобусы, тысячи кожаных корешков. Философский зал — потолок с фреской «Путь человека к истине», 18 метров высотой. Монахи-премонстранты собирали книги веками как завет для тех, кто придёт после. Внутрь залов не пускают — но смотреть с порога достаточно, чтобы остановиться.', quote: 'Труд над знанием, у которого нет конца — и монахи знали это лучше всех.' },

      { time: '9:00', type: 'gathering', icon: '🙏', label: 'ci-blue', title: 'Завершение ритрита', desc: 'Три вопроса перед отъездом + молитва друг за друга' },
      { time: 'Свободно', type: 'free', icon: '🏰', label: 'ci-gold', placeId: 'vysehrad', title: 'Вышеград', desc: 'Кладбище великих чехов — Дворжак, Муха, Чапек. Виды на Влтаву без толп.' },
      { time: 'Свободно', type: 'free', icon: '🌲', label: 'ci-green', placeId: 'petrin', title: 'Петршин холм', desc: 'Яблоневые сады в цвету, вид на город, финальное созерцание' },
      { time: 'Вечер', type: 'free', icon: '🍺', label: 'ci-gold', placeId: 'letna', title: 'Летна — пивной сад', desc: 'Прощальный вечер с видом на весь город' }
    ],
    places: ['waldstein-garden', 'petrin', 'vysehrad', 'letna'],
    extras: ['old-jewish-cemetery', 'mucha-museum'],
    scripture: {
      passages: [],
      isClosing: true,
      questions: [
        { num: '1', text: 'Что из увиденного в этом городе ты не хочешь забыть?' },
        { num: '2', text: 'Что изменилось в том, как ты смотришь на свой труд?' },
        { num: '3', text: 'Кому первому ты хочешь передать то, что открылось за эти дни?' }
      ],
      conclusion: 'Молитва над каждым человеком в команде. Не длинная. Одно предложение.'

  }
];

// ── APP STATE ─────────────────────────────────────────────────────────────────
let currentDayId = 0;
let activeTab = 'today';
let map = null;
let mapMarkers = {};
let userMarker = null;
let userLat = null, userLng = null;

function getCurrentDayId() {
  const now = new Date();
  for (let i = 0; i < DAYS.length; i++) {
    const d = new Date(DAYS[i].date);
    if (now.toDateString() === d.toDateString()) return i;
  }
  const start = new Date(DAYS[0].date);
  const end = new Date(DAYS[DAYS.length - 1].date);
  if (now < start) return 0;
  if (now > end) return DAYS.length - 1;
  return 0;
}

function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371, dLat = (lat2 - lat1) * Math.PI / 180, dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fmtDist(km) {
  return km < 1 ? Math.round(km * 1000) + ' м' : km.toFixed(1) + ' км';
}

function mapsUrl(lat, lng, name) {
  return `https://maps.google.com/?q=${lat},${lng}(${encodeURIComponent(name)})`;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderHeader() {
  const d = DAYS[currentDayId];
  const dates = ['6', '7', '8', '9', '10'];
  const months = { 0: '6 мая', 1: '7 мая', 2: '8 мая', 3: '9 мая', 4: '10 мая' };
  document.getElementById('hdr-date').textContent = months[currentDayId] + ' · Прага';
  document.getElementById('hdr-title').textContent = d.title + (d.dayNum ? '' : '');
  const pills = document.getElementById('day-pills');
  pills.innerHTML = DAYS.map((dd, i) => `<button class="dpill${i===currentDayId?' active':''}" onclick="switchDay(${i})">${dates[i]}</button>`).join('');
}

function renderToday() {
  const d = DAYS[currentDayId];
  const now = new Date();
  let html = '';

  // Hero
  html += `<div class="day-hero">
    <div class="hero-label">${d.title}</div>
    <div class="hero-title">${d.theme}</div>
    ${d.lectio ? `<div class="hero-passage">📖 ${d.lectio.passage}</div>` : ''}
  </div>`;

  // Opening question / day 4 questions
  if (d.question) {
    html += `<div class="question-card">
      <div class="qc-label">Вопрос для начала</div>
      <div class="qc-text">${d.question}</div>
    </div>`;
  }

  if (d.note) {
    html += `<div style="background:#fff8e6;border:1px solid #e8c84a;border-radius:12px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#7a5e00;">⚡ ${d.note}</div>`;
  }

  // Schedule timeline
  html += `<div class="section-label">Расписание дня</div>`;
  d.schedule.forEach((item, i) => {
    const place = item.placeId ? PLACES[item.placeId] : null;
    const name = item.title;
    const sub = item.desc;
    html += `<div class="tl-item" id="tl-${i}">
      <div class="tl-dot"><span>${item.icon}</span></div>
      <div class="tl-right">
        <div class="tl-time">${item.time}</div>
        <div class="tl-title">${name}</div>
        <div class="tl-sub">${sub}</div>
        ${place ? `<div style="margin-top:6px"><a class="action-btn blue" href="${mapsUrl(place.lat,place.lng,place.name)}" target="_blank" style="font-size:11px;padding:5px 10px;">Открыть на карте →</a></div>` : ''}
      </div>
    </div>`;
  });

  // Day 4 three questions
  if (currentDayId === 4 && d.scripture) {
    html += `<div class="section-label" style="margin-top:20px">Три вопроса перед отъездом</div>`;
    d.scripture.questions.forEach(q => {
      html += `<div class="q-item"><div class="q-num">Вопрос ${q.num}</div><div class="q-text">${q.text}</div></div>`;
    });
  }

  document.getElementById('today-inner').innerHTML = html;
}

function renderPlaces() {
  const d = DAYS[currentDayId];
  let html = '';

  const renderPlace = (pid, tagType) => {
    const p = PLACES[pid];
    if (!p) return '';
    const dist = (userLat && userLng) ? fmtDist(haversineKm(userLat, userLng, p.lat, p.lng)) : null;
    const typeLabel = tagType === 'program' ? '<span class="tag tag-prog">Программа</span>' : tagType === 'food' ? '<span class="tag tag-food">Еда</span>' : '<span class="tag tag-extra">Дополнительно</span>';
    return `<div class="card">
      <div class="card-head" onclick="toggleCard('pc-${pid}', 'arr-${pid}')">
        <div class="card-icon ${p.type==='food'?'ci-terra':p.type==='home'?'ci-green':tagType==='program'?'ci-blue':'ci-gold'}">${p.icon}</div>
        <div class="card-meta">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">${typeLabel}${dist?`<span class="dist-badge">~${dist}</span>`:''}</div>
          <div class="card-name">${p.name}</div>
          <div class="card-sub">${p.sub}${p.hours?` · <span style="color:var(--t3)">${p.hours}</span>`:''}</div>
        </div>
      </div>
      <button class="expand-toggle" onclick="toggleCard('pc-${pid}', 'arr-${pid}')">
        <span>Читать описание</span><span class="expand-arrow" id="arr-${pid}">▼</span>
      </button>
      <div class="card-body" id="pc-${pid}">
        <div class="card-desc">${p.desc}</div>
        ${p.visio ? `<div class="card-visio">${p.visio}</div>` : ''}
        ${p.quote ? `<div class="card-quote">${p.quote}</div>` : ''}
        <div class="card-actions mt-8">
          <a class="action-btn blue" href="${mapsUrl(p.lat,p.lng,p.name)}" target="_blank">Открыть на карте →</a>
        </div>
      </div>
    </div>`;
  };

  if (d.places.length) {
    html += `<div class="section-label">Места по программе</div>`;
    d.places.forEach(pid => { html += renderPlace(pid, 'program'); });
  }
  if (d.extras && d.extras.length) {
    html += `<div class="section-label">Также сегодня</div>`;
    d.extras.forEach(pid => { html += renderPlace(pid, 'extra'); });
  }
  // Always show home + restaurant
  html += `<div class="section-label">Постоянно</div>`;
  html += renderPlace('home', 'extra');
  html += renderPlace('lokal', 'food');

  document.getElementById('places-inner').innerHTML = html;
}

function renderScripture() {
  const d = DAYS[currentDayId];
  let html = '';

  if (d.lectio) {
    html += `<div class="section-label">Lectio Divina — ${d.lectio.passage}</div>`;
    d.lectio.steps.forEach((s, i) => {
      html += `<div class="lectio-step">
        <div class="ls-head" onclick="toggleCard('ls-${i}', 'lsa-${i}')">
          <div class="ls-num">${i+1}</div>
          <div><div class="ls-name">${s.name}</div><div class="ls-sub">${s.sub}</div></div>
          <span class="expand-arrow" id="lsa-${i}" style="margin-left:auto;color:var(--t3)">▼</span>
        </div>
        <div class="card-body" id="ls-${i}">
          <p>${s.text}</p>
          <div class="ls-q">Вопрос: ${s.q}</div>
        </div>
      </div>`;
    });
    html += `<div style="background:var(--blue-ll);border-radius:12px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--t2);border:1px solid var(--border);">В конце каждый называет одно слово или образ, который остановил его. Не объясняйте — просто назовите.</div>`;
  }

  if (d.scripture) {
    if (d.scripture.passages && d.scripture.passages.length) {
      html += `<div class="section-label">Изучение Писания — 16:00</div>`;
      html += `<div style="margin-bottom:12px">`;
      d.scripture.passages.forEach(p => { html += `<span class="passage-chip">${p}</span>`; });
      html += `</div>`;
    } else if (d.scripture.isClosing) {
      html += `<div class="section-label">Три вопроса перед отъездом</div>`;
    }
    d.scripture.questions.forEach(q => {
      html += `<div class="q-item"><div class="q-num">Вопрос ${q.num}</div><div class="q-text">${q.text}</div></div>`;
    });
    if (d.scripture.conclusion) {
      html += `<div class="conclusion-card"><div class="cc-label">Завершение</div><div class="cc-text">${d.scripture.conclusion}</div></div>`;
    }
  }

  if (!d.lectio && !d.scripture) {
    html += `<div class="no-content">Сегодня — день отдыха и открытых разговоров</div>`;
  }

  document.getElementById('scripture-inner').innerHTML = html;
}

// ── MAP ───────────────────────────────────────────────────────────────────────
function initMap() {
  if (map) return;
  map = L.map('map', { zoomControl: false }).setView([HOME.lat, HOME.lng], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19
  }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
}

function updateMapMarkers() {
  if (!map) return;
  Object.values(mapMarkers).forEach(m => map.removeLayer(m));
  mapMarkers = {};

  const d = DAYS[currentDayId];
  const all = [...d.places, ...(d.extras||[])];

  // Home marker
  const homeM = L.marker([HOME.lat, HOME.lng], { icon: L.divIcon({ className: '', html: '<div style="background:#3d6b4f;color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3)">🏠</div>', iconSize: [32,32], iconAnchor: [16,16] }) });
  homeM.addTo(map);
  homeM.on('click', () => showMapInfo('home'));
  mapMarkers['home'] = homeM;

  all.forEach(pid => {
    const p = PLACES[pid];
    if (!p) return;
    const isProg = d.places.includes(pid);
    const bg = isProg ? '#1d3557' : '#8b4513';
    const m = L.marker([p.lat, p.lng], { icon: L.divIcon({ className: '', html: `<div style="background:${bg};color:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:17px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3)">${p.icon}</div>`, iconSize: [36,36], iconAnchor: [18,18] }) });
    m.addTo(map);
    m.on('click', () => showMapInfo(pid));
    mapMarkers[pid] = m;
  });

  // Fit bounds
  const coords = all.map(pid => PLACES[pid] ? [PLACES[pid].lat, PLACES[pid].lng] : null).filter(Boolean);
  coords.push([HOME.lat, HOME.lng]);
  if (coords.length > 1) map.fitBounds(L.latLngBounds(coords), { padding: [40, 40] });
}

function showMapInfo(pid) {
  const p = PLACES[pid];
  const info = document.getElementById('map-info');
  document.getElementById('map-info-name').textContent = p.icon + ' ' + p.name;
  document.getElementById('map-info-desc').textContent = p.desc.substring(0, 120) + '...';
  document.getElementById('map-info-actions').innerHTML = `<a class="map-btn primary" href="${mapsUrl(p.lat,p.lng,p.name)}" target="_blank">Открыть в картах</a><button class="map-btn secondary" onclick="hideMapInfo()">Закрыть</button>`;
  info.style.display = 'block';
}
function hideMapInfo() { document.getElementById('map-info').style.display = 'none'; }

function locateUser() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.circleMarker([userLat, userLng], { radius: 8, fillColor: '#2196F3', fillOpacity: 1, color: '#fff', weight: 2 }).addTo(map);
    map.setView([userLat, userLng], 16);
    renderPlaces(); // update distances
  }, err => alert('Не удалось получить геолокацию'));
}

// ── TOGGLE ────────────────────────────────────────────────────────────────────
function toggleCard(bodyId, arrowId) {
  const body = document.getElementById(bodyId);
  const arrow = document.getElementById(arrowId);
  if (!body) return;
  const isOpen = body.classList.toggle('open');
  if (arrow) arrow.classList.toggle('open', isOpen);
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function showTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('nb-' + tab).classList.add('active');

  if (tab === 'map') {
    if (!map) initMap();
    setTimeout(() => { map.invalidateSize(); updateMapMarkers(); }, 100);
  }
}

function switchDay(id) {
  currentDayId = id;
  renderHeader();
  renderToday();
  renderPlaces();
  renderScripture();
  if (activeTab === 'map') updateMapMarkers();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
currentDayId = getCurrentDayId();
renderHeader();
renderToday();
renderPlaces();
renderScripture();
</script>
